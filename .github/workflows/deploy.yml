# .github/workflows/deploy.yml
#
# Utilise Python pour remplacer les placeholders — évite les
# problèmes de caractères spéciaux avec sed (points, slashes, etc.)

name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject secrets into HTML
        env:
          AIRTABLE_TOKEN:   ${{ secrets.AIRTABLE_TOKEN }}
          AIRTABLE_BASE_ID: ${{ secrets.AIRTABLE_BASE_ID }}
        run: |
          python3 - <<'EOF'
          import os

          token   = os.environ['AIRTABLE_TOKEN']
          base_id = os.environ['AIRTABLE_BASE_ID']

          with open('index.html', 'r', encoding='utf-8') as f:
              content = f.read()

          content = content.replace('__AIRTABLE_TOKEN__',   token)
          content = content.replace('__AIRTABLE_BASE_ID__', base_id)

          with open('index.html', 'w', encoding='utf-8') as f:
              f.write(content)

          # Vérification : les placeholders ne doivent plus exister
          if '__AIRTABLE_TOKEN__' in content or '__AIRTABLE_BASE_ID__' in content:
              print('ERREUR : placeholders encore présents !')
              exit(1)
          else:
              print('OK : secrets injectés avec succès.')
          EOF

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
