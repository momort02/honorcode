# .github/workflows/deploy.yml
#
# Ce workflow :
# 1. Remplace les placeholders dans index.html par les vrais secrets
# 2. Déploie le résultat sur GitHub Pages
#
# Déclenché à chaque push sur main

name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject secrets into HTML
        # Remplace les deux placeholders dans index.html
        # par les vraies valeurs des secrets GitHub
        run: |
          sed -i "s|__AIRTABLE_TOKEN__|${{ secrets.AIRTABLE_TOKEN }}|g" index.html
          sed -i "s|__AIRTABLE_BASE_ID__|${{ secrets.AIRTABLE_BASE_ID }}|g" index.html

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
